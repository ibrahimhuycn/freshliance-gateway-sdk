name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet: ["10.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        working-directory: sdk
        run: dotnet restore

      - name: Build
        working-directory: sdk
        run: dotnet build --no-restore -warnaserror

      - name: Run unit tests
        working-directory: sdk
        run: dotnet test FreshlianceGateway.Sdk.Tests/FreshlianceGateway.Sdk.Tests.csproj --no-build --verbosity normal

      - name: Run integration tests
        working-directory: sdk
        run: dotnet test FreshlianceGateway.Sdk.IntegrationTests/FreshlianceGateway.Sdk.IntegrationTests.csproj --no-build --verbosity normal

      - name: Pack NuGet
        if: github.ref == 'refs/heads/main'
        working-directory: sdk
        run: dotnet pack FreshlianceGateway.Sdk/FreshlianceGateway.Sdk.csproj --no-build -c Release -o artifacts

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: freshliance-gateway-sdk-preview
          path: sdk/artifacts/*.nupkg
